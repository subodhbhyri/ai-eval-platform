apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-eval-ingress
  namespace: ai-eval
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  rules:
    - http:
        paths:
          - path: /api/v1/
            pathType: Prefix
            backend:
              service:
                name: ai-eval-backend
                port:
                  number: 80
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: ai-eval-backend
                port:
                  number: 80
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: ai-eval-backend
                port:
                  number: 80
