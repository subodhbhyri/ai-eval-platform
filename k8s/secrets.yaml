apiVersion: v1
kind: Secret
metadata:
  name: ai-eval-secrets
  namespace: ai-eval
type: Opaque
# stringData accepts plain text — Kubernetes base64-encodes it automatically.
# Do NOT commit real values. Use kubectl create secret (see k8s/README.md).
stringData:
  database-url: "<replace-me>"
  redis-url: "<replace-me>"
  anthropic-api-key: "<replace-me>"
  openai-api-key: "<replace-me>"
  google-api-key: "<replace-me>"
  kafka-bootstrap-servers: "<replace-me>"
  kafka-sasl-username: "<replace-me>"
  kafka-sasl-password: "<replace-me>"
